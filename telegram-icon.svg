<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" id="aso-icon-svg">
  <defs>
    <!-- Background Gradient resembling a gorgeous sunrise/sunset horizon -->
    <linearGradient id="asoBackground" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#120c1f" />
      <stop offset="35%" stop-color="#1e113b" />
      <stop offset="70%" stop-color="#4e1a70" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    
    <!-- Neon Golden Horizon Accent Gradient -->
    <linearGradient id="asoGolden" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffedd5" />
      <stop offset="50%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>

    <!-- Gloss Highlight Overlay -->
    <linearGradient id="asoGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Main circle base -->
  <circle cx="256" cy="256" r="248" fill="url(#asoBackground)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="4" />

  <!-- Inner Soft Ambient Horizon Glow -->
  <circle cx="256" cy="380" r="140" fill="#fb923c" opacity="0.15" filter="blur(30px)" />

  <!-- Sleek Futuristic Horizon Line -->
  <path d="M70 330 C 150 360, 362 360, 442 330" fill="none" stroke="url(#asoGolden)" stroke-width="5" stroke-linecap="round" opacity="0.4" />
  <path d="M100 350 C 180 375, 332 375, 412 350" fill="none" stroke="url(#asoGolden)" stroke-width="2" stroke-linecap="round" opacity="0.25" />

  <!-- Beautiful Modernist "A" combined with chat wing elements -->
  <!-- Left leg of "A", curved like a sleek wing -->
  <path d="M190 350 L240 162 C242 155, 252 155, 254 162 L274 235" fill="none" stroke="url(#asoGolden)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Right dynamic wing, representing messaging / send motion -->
  <path d="M256 160 L336 310 C342 318, 332 328, 322 322 L230 256" fill="none" stroke="url(#asoGolden)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Elegant crossbar forming an infinite loop representing global horizon and chat -->
  <path d="M210 270 C240 250, 276 250, 306 270" fill="none" stroke="url(#asoGolden)" stroke-width="12" stroke-linecap="round" />

  <!-- Communication Particle / Active dot to indicate smart real-time connection -->
  <circle cx="251" cy="140" r="14" fill="#ffffff" filter="drop-shadow(0 0 8px rgba(251, 191, 36, 0.8))" />

  <!-- 3D Glass Gloss Overlay -->
  <circle cx="256" cy="256" r="244" fill="url(#asoGlass)" pointer-events="none" />
</svg>
